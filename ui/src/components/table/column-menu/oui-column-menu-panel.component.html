<!-- Actions container — hidden by default, smoothly appears on header hover/focus.
     Houses the sort indicator and column-menu trigger side by side. -->
<div class="oui-column-header-actions">
  @if (hasSort) {
  <button
    class="oui-column-sort-indicator tw-block"
    type="button"
    [class.oui-column-sort-active]="sortDirection"
    (click)="onSortClick($event)"
    [title]="
      sortDirection === 'asc'
        ? 'Sorted ascending'
        : sortDirection === 'desc'
        ? 'Sorted descending'
        : 'Sort ascending'
    "
    [attr.aria-label]="
      sortDirection === 'asc'
        ? 'Sort descending'
        : sortDirection === 'desc'
        ? 'Clear sort'
        : 'Sort ascending'
    "
  >
    @if (sortDirection === 'asc') {

    <div class="oui-column-sort-indicator--sorting"></div>
    } @else {
    <div
      class="oui-column-sort-indicator--sorting oui-column-sort-indicator--sorting--desc"
    ></div>
    }
  </button>
  }

  <!-- ⋮ trigger button — flows inside the actions container -->
  <button
    #triggerBtn
    class="oui-column-menu-trigger"
    type="button"
    aria-label="Column options"
    [ouiMenuTriggerFor]="columnMenu"
    (menuClosed)="triggerBtn.blur()"
    (click)="$event.stopPropagation()"
  >
    &#8942;
  </button>
</div>

<!-- Dropdown powered by the existing oui-menu component -->
<oui-menu #columnMenu="ouiMenu">
  @if (!isFirst && !isSecond) {
  <button oui-menu-item (click)="select('moveLeft')">
    <oui-icon svgIcon="move_left" class="oui-column-menu-icon"></oui-icon>
    <span>Move to left</span>
  </button>
  } @if (!isFirst && !isLast) {
  <button oui-menu-item (click)="select('moveRight')">
    <oui-icon svgIcon="move_right" class="oui-column-menu-icon"></oui-icon>
    <span>Move to right</span>
  </button>
  }

  <button oui-menu-item (click)="select('hide')">
    <oui-icon svgIcon="hide" class="oui-column-menu-icon"></oui-icon>
    <span>Hide column</span>
  </button>
</oui-menu>
