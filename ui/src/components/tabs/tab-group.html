<oui-tab-header
  #tabHeader
  [selectedIndex]="selectedIndex || 0"
  [disableRipple]="disableRipple"
  [disablePagination]="disablePagination"
  (indexFocused)="_focusChanged($event)"
  (selectFocusedIndex)="selectedIndex = $event"
  >
  @for (tab of _tabs; track tab; let i = $index) {
    <div
      class="mdc-tab oui-mdc-tab oui-mdc-focus-indicator"
      #tabNode
      role="tab"
      ouiTabLabelWrapper
      cdkMonitorElementFocus
      [id]="_getTabLabelId(i)"
      [attr.tabIndex]="_getTabIndex(i)"
      [attr.aria-posinset]="i + 1"
      [attr.aria-setsize]="_tabs.length"
      [attr.aria-controls]="_getTabContentId(i)"
      [attr.aria-selected]="selectedIndex === i"
      [attr.aria-label]="tab.ariaLabel || null"
      [attr.aria-labelledby]="(!tab.ariaLabel && tab.ariaLabelledby) ? tab.ariaLabelledby : null"
      [class.mdc-tab--active]="selectedIndex === i"
      [class]="tab.labelClass"
      [disabled]="tab.disabled"
      [fitInkBarToContent]="fitInkBarToContent"
      (click)="_handleClick(tab, tabHeader, i)"
      (keyup.enter)="_handleEnter()"
      (cdkFocusChange)="_tabFocusChanged($event, i)"
      >
      <span class="mdc-tab__ripple"></span>
      <!-- Needs to be a separate element, because we can't put
      `overflow: hidden` on tab due to the ink bar. -->
      <div class="oui-mdc-tab-ripple"></div>
      <span class="mdc-tab__content">
        <span class="mdc-tab__text-label">
          <!-- If there is a label template, use it. -->
          @if (tab.templateLabel) {
            <ng-template [cdkPortalOutlet]="tab.templateLabel"></ng-template>
          } @else {
            {{tab.textLabel}}
          }
          <!-- If there is not a label template, fall back to the text label. -->
        </span>
      </span>
    </div>
  }
</oui-tab-header>

<div
  class="oui-mdc-tab-body-wrapper"
  [class.oui-text-height]="getHTMLText"
  [class._oui-animation-noopable]="_animationMode === 'NoopAnimations'"
  #tabBodyWrapper
  >
  @for (tab of _tabs; track tab; let i = $index) {
    <oui-tab-body
      role="tabpanel"
      [id]="_getTabContentId(i)"
      [attr.tabindex]="(contentTabIndex !== null && selectedIndex === i) ? contentTabIndex : null"
      [attr.aria-labelledby]="_getTabLabelId(i)"
      [class.oui-mdc-tab-body-active]="selectedIndex === i"
      [class]="tab.bodyClass"
      [content]="tab.contentWithin"
      [position]="tab.position!"
      [origin]="tab.origin"
      [animationDuration]="animationDuration"
      [preserveContent]="preserveContent"
      (_onCentered)="_removeTabBodyWrapperHeight()"
      (_onCentering)="_setTabBodyWrapperHeight($event)"
      >
    </oui-tab-body>
  }
</div>
