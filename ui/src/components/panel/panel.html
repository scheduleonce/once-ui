<ng-template>
  <div
    class="oui-panel"
    [class]="_classList"
    (mouseleave)="_handleMouseLeave($event)"
    (mouseenter)="_handleMouseEnter($event)"
    role="dialog"
  >
    <div
      class="oui-panel-content"
      [style]="{ width: width() !== undefined ? width() + 'px' : null }"
      tabindex="-1"
    >
      <ng-content></ng-content>
      <button
        (click)="_handleCloseIcon()"
        class="close-panel"
        aria-label="Close"
      >
        <oui-icon svgIcon="close-icon_8X8"></oui-icon>
      </button>
    </div>
  </div>
</ng-template>
